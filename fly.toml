# Fly.io config for the always-on presence sidecar.
# The whole point is that it never sleeps, so the machine stays running 24/7.

app = "bot-presence"
primary_region = "yyz"

[build]

# No services / no [http_service] block: this app exposes no ports. It only
# holds an outbound gateway WebSocket. Fly keeps it running because of the
# machine settings below, not because of inbound traffic.

[[vm]]
size = "shared-cpu-1x"
memory = "256mb"

# Keep exactly one machine alive at all times — never scale to zero, or the
# gateway connection drops and the bot blinks offline.
[machine]
auto_stop_machines = false
auto_start_machines = false
min_machines_running = 1
